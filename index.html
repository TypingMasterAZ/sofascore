<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProScore Elite | Real-Time</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #38bdf8; --red: #f43f5e; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; }
        header { padding: 15px 20px; background: rgba(15, 23, 42, 0.9); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .container { padding: 15px; max-width: 500px; margin: 0 auto; }
        .match-card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .match-body { display: flex; align-items: center; justify-content: space-between; }
        .team { flex: 1; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .logo-box { width: 48px; height: 48px; background: #fff; border-radius: 12px; padding: 4px; margin-bottom: 8px; }
        .team-logo { width: 100%; height: 100%; object-fit: contain; }
        .score { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
        .minute { font-size: 10px; background: var(--red); padding: 2px 10px; border-radius: 20px; font-weight: 800; }
        .team-name { font-size: 12px; font-weight: 700; opacity: 0.9; }
        .league { font-size: 9px; color: var(--accent); text-align: center; margin-bottom: 10px; font-weight: 800; opacity: 0.6; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 18px; font-weight: 800;">PRO<span style="color:var(--accent)">SCORE</span></div>
    <button onclick="fetchData()" style="background:var(--accent); border:none; padding:6px 15px; border-radius:8px; font-weight:800; cursor:pointer;">YENİLƏ</button>
</header>

<div class="container" id="matchList"></div>

<script>
    const API_URL = "https://canli-neticeler.onrender.com";

    async function fetchData() {
        try {
            const res = await fetch(`${API_URL}/live-scores`);
            const data = await res.json();
            render(data);
        } catch (e) { console.error(e); }
    }

    function render(matches) {
        const list = document.getElementById("matchList");
        list.innerHTML = matches.map(m => {
            // Proxy vasitəsilə orijinal loqoları çəkirik
            const getLogo = (img) => img ? `${API_URL}/logo?id=${img.replace('.png', '')}` : '';
            const fallback = (n) => `https://ui-avatars.com/api/?name=${encodeURIComponent(n)}&background=38bdf8&color=fff&bold=true`;

            return `
                <div class="match-card">
                    <div class="league">${m.league}</div>
                    <div class="match-body">
                        <div class="team">
                            <div class="logo-box">
                                <img src="${getLogo(m.homeImg)}" class="team-logo" onerror="this.src='${fallback(m.home)}';">
                            </div>
                            <div class="team-name">${m.home}</div>
                        </div>
                        <div style="text-align:center; flex: 0 0 80px;">
                            <div class="score">${m.score.home}:${m.score.away}</div>
                            <div class="minute">${m.minute}</div>
                        </div>
                        <div class="team">
                            <div class="logo-box">
                                <img src="${getLogo(m.awayImg)}" class="team-logo" onerror="this.src='${fallback(m.away)}';">
                            </div>
                            <div class="team-name">${m.away}</div>
                        </div>
                    </div>
                </div>
            `;
        }).join("");
    }

    fetchData();
    setInterval(fetchData, 45000);
</script>
</body>
</html>
