<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProScore | Canlı Nəticələr</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #38bdf8; --red: #f43f5e; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; }
        header { padding: 15px 20px; background: rgba(15, 23, 42, 0.95); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .container { padding: 15px; max-width: 500px; margin: 0 auto; }
        .match-card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .match-body { display: flex; align-items: center; justify-content: space-between; }
        .team { flex: 1; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .logo-box { width: 50px; height: 50px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
        .team-logo { width: 100%; height: 100%; object-fit: contain; }
        .score { font-size: 32px; font-weight: 800; color: #fff; line-height: 1; }
        .minute { font-size: 11px; color: var(--red); font-weight: 800; margin-top: 5px; }
        .team-name { font-size: 12px; font-weight: 700; max-width: 120px; height: 32px; display: flex; align-items: center; justify-content: center; }
        .league { font-size: 9px; color: var(--accent); text-align: center; margin-bottom: 12px; font-weight: 800; opacity: 0.8; text-transform: uppercase; }
        .btn-refresh { background: var(--accent); border: none; padding: 8px 16px; border-radius: 10px; font-weight: 800; cursor: pointer; color: #000; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 20px; font-weight: 800;">PRO<span style="color:var(--accent)">SCORE</span></div>
    <button class="btn-refresh" onclick="fetchData()">YENİLƏ</button>
</header>

<div class="container" id="matchList">
    <div style="text-align:center; padding:100px; opacity: 0.5;">Oyunlar axtarılır...</div>
</div>

<script>
    const API_URL = "https://canli-neticeler.onrender.com";

    async function fetchData() {
        try {
            const res = await fetch(`${API_URL}/live-scores?t=${Date.now()}`);
            const data = await res.json();
            render(data);
        } catch (e) {
            document.getElementById("matchList").innerHTML = "Serverlə bağlantı kəsildi.";
        }
    }

    function render(matches) {
        const list = document.getElementById("matchList");
        if (!matches || matches.length === 0) {
            list.innerHTML = "<div style='text-align:center; padding:100px; opacity:0.5;'>Hazırda canlı oyun yoxdur.</div>";
            return;
        }

        list.innerHTML = matches.map(m => {
            // Sofascore-un rəsmi loqo bazası
            const homeLogo = `https://api.sofascore.app/api/v1/team/${m.homeId}/image`;
            const awayLogo = `https://api.sofascore.app/api/v1/team/${m.awayId}/image`;
            const fb = (n) => `https://ui-avatars.com/api/?name=${encodeURIComponent(n)}&background=1e293b&color=38bdf8&bold=true`;

            return `
                <div class="match-card">
                    <div class="league">${m.league}</div>
                    <div class="match-body">
                        <div class="team">
                            <div class="logo-box">
                                <img src="${homeLogo}" class="team-logo" onerror="this.src='${fb(m.home)}';">
                            </div>
                            <div class="team-name">${m.home}</div>
                        </div>
                        <div style="text-align:center; flex: 0 0 100px;">
                            <div class="score">${m.score.home}:${m.score.away}</div>
                            <div class="minute">${m.minute}${isNaN(m.minute) ? '' : "'"}</div>
                        </div>
                        <div class="team">
                            <div class="logo-box">
                                <img src="${awayLogo}" class="team-logo" onerror="this.src='${fb(m.away)}';">
                            </div>
                            <div class="team-name">${m.away}</div>
                        </div>
                    </div>
                </div>
            `;
        }).join("");
    }

    fetchData();
    setInterval(fetchData, 45000);
</script>
</body>
</html>
