<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProScore Elite | Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617; --card: rgba(30, 41, 59, 0.7);
            --green: #22c55e; --red: #f43f5e; --text: #f8fafc;
            --muted: #94a3b8; --border: rgba(255, 255, 255, 0.1); --accent: #38bdf8;
        }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); background-attachment: fixed; }
        header { background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(12px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .filters { padding: 15px; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
        .search-box, .league-select { width: 100%; padding: 12px; border-radius: 10px; background: var(--card); border: 1px solid var(--border); color: #fff; outline: none; }
        .container { padding: 10px; max-width: 600px; margin: 0 auto; padding-bottom: 100px; }
        .match-card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        .match-body { display: flex; align-items: center; justify-content: space-between; }
        .team-side { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .team-logo { width: 45px; height: 45px; object-fit: contain; margin-bottom: 8px; }
        .score { font-size: 26px; font-weight: 800; color: #fff; }
        .minute-badge { font-size: 10px; padding: 4px 10px; border-radius: 20px; background: #000; color: #fff; }
        .live-bg { background: var(--red); box-shadow: 0 0 10px rgba(244, 63, 94, 0.3); }
        .goals-list { display: flex; justify-content: space-between; margin-top: 10px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 8px; }
    </style>
</head>
<body>

<header>
    <h1 style="font-size:18px; font-weight:800; color:var(--accent); margin:0">PROSCORE ELITE</h1>
    <button class="search-box" style="width:auto; padding:5px 15px" onclick="fetchData()">Yenilə</button>
</header>

<div class="filters">
    <input type="text" id="searchInput" class="search-box" placeholder="Klub və ya liqa axtar...">
    <select id="leagueFilter" class="league-select">
        <option value="all">BÜTÜN LİQALAR</option>
    </select>
</div>

<div class="container" id="matchContainer"></div>

<script>
    let allMatches = [];

    async function fetchData() {
        const container = document.getElementById("matchContainer");
        try {
            const res = await fetch(`https://canli-neticeler.onrender.com/live-scores?t=${Date.now()}`);
            allMatches = await res.json();
            updateLeagueFilter();
            renderMatches();
        } catch (e) {
            container.innerHTML = `<div style="text-align:center; color:var(--red)">Xəta: Serverə bağlanmaq olmadı.</div>`;
        }
    }

    function updateLeagueFilter() {
        const select = document.getElementById("leagueFilter");
        const leagues = [...new Set(allMatches.map(m => m.displayLeague))];
        let html = '<option value="all">BÜTÜN LİQALAR</option>';
        leagues.forEach(l => html += `<option value="${l}">${l}</option>`);
        select.innerHTML = html;
    }

    function renderMatches() {
        const container = document.getElementById("matchContainer");
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        const selectedLeague = document.getElementById("leagueFilter").value;

        const filtered = allMatches.filter(m => {
            const matchesSearch = m.home.toLowerCase().includes(searchTerm) || m.away.toLowerCase().includes(searchTerm) || m.displayLeague.toLowerCase().includes(searchTerm);
            const matchesLeague = selectedLeague === "all" || m.displayLeague === selectedLeague;
            return matchesSearch && matchesLeague;
        });

        container.innerHTML = filtered.map(m => `
            <div class="match-card">
                <div style="text-align:center; font-size:10px; color:var(--accent); margin-bottom:8px; font-weight:700">${m.displayLeague}</div>
                <div class="match-body">
                    <div class="team-side">
                        <img src="${m.homeLogo}" class="team-logo" onerror="this.src='https://via.placeholder.com/45?text=?'">
                        <div style="font-weight:700; font-size:13px; text-align:center">${m.home}</div>
                    </div>
                    <div style="text-align:center; flex: 0 0 85px;">
                        <div class="score">${m.score.home} - ${m.score.away}</div>
                        <div class="minute-badge ${m.minute !== 'FT' ? 'live-bg' : ''}">${m.minute}</div>
                    </div>
                    <div class="team-side">
                        <img src="${m.awayLogo}" class="team-logo" onerror="this.src='https://via.placeholder.com/45?text=?'">
                        <div style="font-weight:700; font-size:13px; text-align:center">${m.away}</div>
                    </div>
                </div>
                ${m.scorers.length > 0 ? `
                <div class="goals-list">
                    <div style="flex:1">
                        ${m.scorers.filter(s => s.side === 1).map(s => `<div>⚽ ${s.name} ${s.time}'</div>`).join("")}
                    </div>
                    <div style="flex:1; text-align:right">
                        ${m.scorers.filter(s => s.side === 2).map(s => `<div>${s.name} ${s.time}' ⚽</div>`).join("")}
                    </div>
                </div>` : ''}
            </div>
        `).join("");
    }

    document.getElementById("searchInput").addEventListener("input", renderMatches);
    document.getElementById("leagueFilter").addEventListener("change", renderMatches);

    fetchData();
    setInterval(fetchData, 60000); // Hər dəqiqə yenilə
</script>
</body>
</html>
